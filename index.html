<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прайс | Smokin174</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        :root {
            --bg-black: #000000;
            --neon-green: #2bff00;
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-black); color: #fff; overflow-x: hidden; letter-spacing: -0.5px; min-height: 100vh; }
        
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #0a1a05 0%, #000 100%);
        }
        
        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        header { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            padding: 1.2rem 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .logo-text { font-weight: 900; font-size: 1.8rem; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .btn-channel { background: #fff; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 900; font-size: 0.85rem; text-decoration: none; text-transform: uppercase; transition: 0.3s; }
        .btn-channel:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .gift-icon { color: var(--neon-green); cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px var(--neon-green)); }
        .gift-icon:hover { transform: scale(1.2); filter: drop-shadow(0 0 15px var(--neon-green)); }
        .admin-icon { opacity: 0.3; cursor: pointer; transition: 0.3s; color: #fff; }
        .admin-icon.active { opacity: 1; color: var(--neon-green); filter: drop-shadow(0 0 8px var(--neon-green)); }
        
        .cat-bar { padding: 20px 0; overflow-x: auto; scrollbar-width: none; position: relative; z-index: 10; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-container { display: flex; gap: 12px; padding: 0 20px; max-width: 1400px; margin: 0 auto; }
        .cat-link { 
            padding: 12px 26px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; transition: var(--transition); white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: #fff;
        }
        .cat-link.active { background: var(--neon-green); color: #000; border-color: var(--neon-green); box-shadow: 0 0 20px rgba(43, 255, 0, 0.4); }
        
        .main { max-width: 1400px; margin: 0 auto; padding: 0 15px 120px; position: relative; z-index: 5; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        /* Изменение сетки: 5 в ряд на больших экранах */
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(5, 1fr); } }
        
        .card { border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; opacity: 0; transform: translateY(20px); animation: appear 0.6s forwards; transition: transform 0.3s; position: relative; }
        @keyframes appear { to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-5px); }
        .card-img-wrapper { width: 100%; height: 140px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        /* Отображение фото: object-fit: cover */
        .card-img { width: 100%; height: 100%; object-fit: cover; background: #111; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.1); }
        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-name { font-weight: 900; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 8px; min-height: 2.2em; line-height: 1.2; }
        .card-price { font-weight: 900; font-size: 1.2rem; color: var(--neon-green); text-shadow: 0 0 10px rgba(43,255,0,0.3); }
        .btn-variants { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px; border-radius: 50px; font-weight: 900; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-variants:hover { background: #fff; color: #000; }

        /* Status Out of Stock */
        .card.out-of-stock { filter: grayscale(1); opacity: 0.5; }
        .out-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: #ff3b30; color: #fff; padding: 5px 15px; font-weight: 900; font-size: 0.7rem; z-index: 10; border-radius: 5px; box-shadow: 0 0 15px rgba(255,0,0,0.5); pointer-events: none; }
        
        /* Skeletons */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .skeleton { background: rgba(255, 255, 255, 0.05); border-radius: 30px; animation: pulse 1.5s infinite ease-in-out; }

        /* Scroll Top */
        #scrollTop { position: fixed; bottom: 110px; right: 25px; width: 50px; height: 50px; background: var(--neon-green); color: #000; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; box-shadow: 0 5px 20px rgba(43,255,0,0.4); transition: 0.3s; }
        
        .tier-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .tier-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; font-weight: 900; font-size: 0.7rem; color: #fff; cursor: pointer; transition: 0.3s; }
        .tier-btn.active { background: var(--neon-green); color: #000; border-color: var(--neon-green); }

        .slot-window { position: relative; width: 100%; height: 160px; background: rgba(0,0,0,0.8); border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; margin: 20px 0; }
        .slot-track { position: absolute; top: 0; left: 0; width: 100%; transition: none; }
        .slot-item { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: #fff; text-transform: uppercase; text-align: center; }
        .slot-indicators { position: absolute; top: 50%; left: 0; width: 100%; height: 40px; transform: translateY(-50%); display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        .arrow { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; }
        .arrow-left { border-left: 20px solid var(--neon-green); margin-left: 5px; }
        .arrow-right { border-right: 20px solid var(--neon-green); margin-right: 5px; }
        
        .btn-full { background: var(--neon-green); color: #000; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-full:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(43,255,0,0.4); }
        .btn-full:disabled { opacity: 0.5; filter: grayscale(1); }
        .btn-save { max-width: 260px; align-self: center; border-radius: 18px; letter-spacing: 0.08em; margin-top: 24px !important; }
        
        .cart-fab { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--neon-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1500; box-shadow: 0 10px 40px rgba(43, 255, 0, 0.5); transform: scale(0); transition: var(--transition); cursor: pointer; color: #000; }
        .cart-fab.visible { transform: scale(1); }
        .cart-count { position: absolute; top: 0; right: 0; background: #000; color: #fff; width: 24px; height: 24px; border-radius: 50%; font-weight: 900; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; border: 2px solid var(--neon-green); }
        .add-fab { position: fixed; bottom: 30px; left: 30px; width: 70px; height: 70px; background: var(--neon-green); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1500; box-shadow: 0 10px 40px rgba(43, 255, 0, 0.5); transition: var(--transition); cursor: pointer; color: #000; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; opacity: 0; transition: opacity 0.4s; }
        .overlay.active { display: flex; opacity: 1; }
        .modal { border-radius: 40px; padding: 30px; width: 95%; max-width: 500px; transform: scale(0.9); transition: 0.4s; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
        .overlay.active .modal { transform: scale(1); }
        .modal-close { position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; border: none; border-radius: 50%; background: rgba(255,255,255,0.15); color: #fff; font-size: 1.5rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: 0.2s; z-index: 10; }
        .modal-close:hover { background: rgba(255,255,255,0.25); }

        .fullscreen-modal { width: 100%; height: 100%; max-width: 100% !important; max-height: 100vh !important; border-radius: 0 !important; padding: 20px !important; display: flex; flex-direction: column; background: #000 !important; text-align: left; }
        .photo-uploader { height: 180px; background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,255,255,0.1); border-radius: 25px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .admin-product-image .photo-uploader { height: 100%; min-height: 200px; }
        #previewImg { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        .admin-product-layout { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        .admin-product-fields { display: flex; flex-direction: column; gap: 0; }
        .admin-product-image { min-height: 200px; height: 200px; overflow: hidden; }
        .admin-flavors-block { border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; background: rgba(0,0,0,0.2); overflow: hidden; }
        .admin-flavors-block .admin-flavors-scroll { max-height: 180px; overflow-y: scroll; padding: 12px; }
        .admin-flavors-block label { padding: 10px 12px 0; }
        .admin-flavors-block .inp { margin: 8px 12px 12px; border-radius: 12px; }
        
        .admin-input-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .admin-input-card label { display: block; font-size: 0.65rem; text-transform: uppercase; color: var(--neon-green); margin-bottom: 8px; font-weight: 900; }
        .admin-input-card input, .admin-input-card select { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; font-weight: 600; outline: none; }
        .admin-input-card select option { background: #111; color: #fff; }
        
        .flavor-tag { background: var(--neon-green); color: #000; padding: 8px 15px; border-radius: 12px; font-weight: 900; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px; margin-right: 8px; margin-bottom: 8px; }
        .inp { width: 100%; padding: 18px; border-radius: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; margin-bottom: 12px; outline: none; }
        .admin-btns { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 6px; }
        .btn-mini { width: 32px; height: 32px; border-radius: 999px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; padding: 0; }
        .btn-mini-edit { background: rgba(43,255,0,0.18); color: var(--neon-green); box-shadow: 0 0 8px rgba(43,255,0,0.4); }
        .btn-mini-edit:hover { background: rgba(43,255,0,0.3); }
        .btn-mini-del { background: rgba(255,59,48,0.25); color: #fff; }
        .btn-mini-del:hover { background: rgba(255,59,48,0.4); }
        
        .flavor-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-bottom: 10px; gap: 10px; }
        .flavor-name { font-weight: 900; text-align: left; flex-grow: 1; font-size: 0.9rem; line-height: 1.2; }
        .flavor-btn { background: var(--neon-green); border: none; padding: 10px 15px; border-radius: 12px; font-weight: 900; white-space: nowrap; flex-shrink: 0; color: #000; cursor: pointer; }
        
        .modal::-webkit-scrollbar, #vList::-webkit-scrollbar, .admin-flavors-scroll::-webkit-scrollbar { display: none; }
        .modal, #vList, .admin-flavors-scroll { scrollbar-width: none; }

        @media (max-width: 600px) {
            .modal { width: 95%; padding: 20px 15px; }
            .flavor-row { padding: 12px 10px; }
            .flavor-btn { padding: 8px 12px; font-size: 0.8rem; }
            .flavor-name { font-size: 0.85rem; }
        }

        @media (min-width: 768px) {
            .admin-product-layout { grid-template-columns: 1fr 280px; align-items: start; }
            .admin-product-image { height: 280px; min-height: 280px; }
            .admin-product-image .photo-uploader { height: 100%; min-height: 0; }
            .admin-flavors-block .admin-flavors-scroll { max-height: 220px; }
        }
        @media (min-width: 900px) {
            .overlay#adminOverlay { align-items: center; justify-content: center; }
            .fullscreen-modal { width: 900px; height: auto; max-width: 900px !important; max-height: 90vh !important; border-radius: 32px !important; padding: 24px 28px !important; box-shadow: 0 24px 80px rgba(0,0,0,0.7); overflow-y: auto; scrollbar-width: none; }
            .fullscreen-modal::-webkit-scrollbar { width: 0; height: 0; }
            #pForm { height: auto; max-height: none; overflow-y: visible; }
            .admin-product-layout { grid-template-columns: 1fr 320px; }
            .admin-product-image { height: 320px; min-height: 320px; }
            .admin-flavors-block .admin-flavors-scroll { max-height: 260px; }
        }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="scrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
    <i class="fas fa-chevron-up"></i>
</div>

<header>
    <div class="header-content">
        <div class="logo-text">ПРАЙС</div>
        <div class="nav-right">
            <i class="fas fa-gift fa-2xl gift-icon" onclick="openWheel()"></i>
            <a href="https://t.me/smokin174" target="_blank" class="btn-channel">КАНАЛ</a>
            <i class="fas fa-fingerprint fa-2xl admin-icon" id="adminLock" onclick="handleAdminClick()"></i>
        </div>
    </div>
</header>

<div class="cat-bar"><div class="cat-container" id="cats"></div></div>

<main class="main">
    <div class="grid" id="productGrid"></div>
</main>

<div class="overlay" id="wheelOverlay" onclick="closeModal('wheelOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('wheelOverlay')" aria-label="Закрыть">×</button>
        <h2 style="font-weight:900; text-transform:uppercase; margin-bottom:10px;">LUCKY SMOKIN</h2>
        <div class="tier-selector">
            <button class="tier-btn active" id="t10" onclick="setTier(10)">10 ₽</button>
            <button class="tier-btn" id="t50" onclick="setTier(50)"> 50 ₽</button>
            <button class="tier-btn" id="t150" onclick="setTier(150)"> 150 ₽</button>
        </div>
        <p id="spinStatusText" style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 10px;">ЗАГРУЗКА...</p>
        <div class="slot-window">
            <div class="slot-indicators"><div class="arrow arrow-left"></div><div class="arrow arrow-right"></div></div>
            <div class="slot-track" id="slotTrack"></div>
        </div>
        <div id="paymentButtons">
            <button class="btn-full" id="tgPayBtn" style="background: #0088cc; color: #fff;" onclick="startStarsPay()">КУПИТЬ СПИН 10 ⭐</button>
        </div>
        <button class="btn-full" id="spinBtn" style="display:none;" onclick="runSpinAnimation()">КРУТИТЬ</button>
        <div id="spinResult" style="margin-top:20px; font-weight:900; color: var(--neon-green); font-size: 1.2rem;"></div>
    </div>
</div>

<div class="cart-fab" id="cartFab" onclick="openModal('cartOverlay')">
    <i class="fas fa-shopping-bag fa-xl"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<div class="overlay" id="cartOverlay" onclick="closeModal('cartOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('cartOverlay')" aria-label="Закрыть">×</button>
        <h2 style="margin-bottom:20px; font-weight:900; color:var(--neon-green);">КОРЗИНА</h2>
        <div id="cartItems" style="max-height:40vh; overflow-y:auto; margin-bottom:20px;"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px;">
            <span style="font-weight: 900;">ИТОГО</span>
            <span style="font-weight:900; font-size:1.8rem; color: var(--neon-green);" id="cartTotal">0 ₽</span>
        </div>
        <button class="btn-full" onclick="sendToManager()">ОФОРМИТЬ В TG</button>
    </div>
</div>

<div class="overlay" id="vOverlay" onclick="closeModal('vOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('vOverlay')" aria-label="Закрыть">×</button>
        <h2 id="vTitle" style="margin-bottom:25px; font-weight:900;">ВКУСЫ</h2>
        <div id="vList" style="max-height:50vh; overflow-y:auto;"></div>
    </div>
</div>

<div class="overlay" id="loginOverlay" onclick="closeModal('loginOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('loginOverlay')" aria-label="Закрыть">×</button>
        <h2 style="margin-bottom:20px; font-weight:900;">АДМИН</h2>
        <input type="password" id="pass" class="inp" style="text-align:center;" placeholder="ПАРОЛЬ">
        <button type="button" onclick="tryLogin()" class="btn-full">ВОЙТИ</button>
    </div>
</div>

<div class="overlay" id="adminMenuOverlay" onclick="closeModal('adminMenuOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('adminMenuOverlay')" aria-label="Закрыть">×</button>
        <h2 style="margin-bottom:20px; font-weight:900;">АДМИН ПАНЕЛЬ</h2>
        <button class="btn-full" onclick="closeModal('adminMenuOverlay'); openRouletteAdmin();">⚙️ НАСТРОЙКА РУЛЕТКИ</button>
        <button class="btn-full" style="background:#111; color:#fff; border:1px solid rgba(255,255,255,0.2);" onclick="closeModal('adminMenuOverlay'); openRouletteHistory();">📜 ИСТОРИЯ РУЛЕТКИ</button>
        <button class="btn-full" style="background:#ff3b30; color:#fff;" onclick="logoutAdmin()">ВЫЙТИ</button>
    </div>
</div>

<div class="overlay" id="rouletteAdminOverlay" onclick="closeModal('rouletteAdminOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('rouletteAdminOverlay')" aria-label="Закрыть">×</button>
        <h2 style="margin-bottom:20px; font-weight:900;">РУЛЕТКА</h2>
        <div class="tier-selector">
            <button class="tier-btn active" id="at10" onclick="setAdminTier(10)">10 ₽</button>
            <button class="tier-btn" id="at50" onclick="setAdminTier(50)">50 ₽</button>
            <button class="tier-btn" id="at150" onclick="setAdminTier(150)">150 ₽</button>
        </div>
        <div id="rouletteItemsList" style="max-height: 40vh; overflow-y: auto; margin-bottom: 15px;"></div>
        <button class="btn-full" style="background:#fff; color:#000;" onclick="addRouletteItemUI()">+ ПРИЗ</button>
        <button class="btn-full" onclick="saveRouletteConfig()">СОХРАНИТЬ</button>
    </div>
</div>

<div class="overlay" id="rouletteHistoryOverlay" onclick="closeModal('rouletteHistoryOverlay')">
    <div class="modal glass" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('rouletteHistoryOverlay')" aria-label="Закрыть">×</button>
        <h2 style="margin-bottom:16px; font-weight:900;">ИСТОРИЯ РУЛЕТКИ</h2>
        <div id="rouletteHistoryList" style="max-height:60vh; overflow-y:auto; text-align:left; font-size:0.8rem;"></div>
    </div>
</div>

<div class="add-fab" id="addFab" onclick="openAddModal()">
    <i class="fas fa-plus fa-xl"></i>
</div>

<div class="overlay" id="adminOverlay" onclick="closeModal('adminOverlay')">
    <div class="modal glass fullscreen-modal" onclick="event.stopPropagation()">
        <button type="button" class="modal-close" onclick="closeModal('adminOverlay')" aria-label="Закрыть">×</button>
        <form id="pForm" style="display:flex; flex-direction:column; height:100%;">
            <input type="hidden" id="pId"><input type="hidden" id="pImg">
            <div class="admin-product-layout">
                <div class="admin-product-fields">
                    <div class="admin-input-card"><label>Название</label><input type="text" id="pName" required></div>
                    <div class="admin-input-card"><label>Цена</label><input type="number" id="pPrice" required></div>
                    <div class="admin-input-card"><label>Категория</label><input type="text" id="pCat" required></div>
                    <div class="admin-input-card"><label>Текст кнопки</label><input type="text" id="pBtnName"></div>
                    <div class="admin-input-card" style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="pInStock" style="width:20px; height:20px;" checked>
                        <label style="margin:0;">В НАЛИЧИИ</label>
                    </div>
                    <div class="admin-input-card">
                        <label>Режим фото</label>
                        <select id="pFit">
                            <option value="cover">Заполнить (Cover)</option>
                            <option value="contain">Вместить (Contain)</option>
                        </select>
                    </div>
                    <div class="admin-input-card admin-flavors-block">
                        <label>ВКУСЫ</label>
                        <div id="adminVList" class="admin-flavors-scroll"></div>
                        <input type="text" id="vInp" class="inp" placeholder="+Enter" onkeydown="if(event.key==='Enter'){event.preventDefault(); addV(this.value); this.value=''}">
                    </div>
                </div>
                <div class="admin-product-image">
                    <div class="photo-uploader" onclick="document.getElementById('fInp').click()">
                        <img id="previewImg" style="display:none;">
                        <i class="fas fa-camera fa-2xl" style="opacity:0.5;"></i>
                        <input type="file" id="fInp" accept="image/*" style="display:none;">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-full btn-save">СОХРАНИТЬ</button>
        </form>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp || {
        ready: function(){}, expand: function(){}, 
        enableClosingConfirmation: function(){},
        showConfirm: function(m, c){ if(confirm(m)) c(true); },
        openTelegramLink: function(u){ window.open(u, '_blank'); },
        HapticFeedback: { impactOccurred: function(){}, notificationOccurred: function(){} }
    };
    try { tg.ready(); tg.expand(); if(tg.enableClosingConfirmation) tg.enableClosingConfirmation(); } catch (e) {}

    const firebaseConfig = {
        apiKey: "AIzaSyD3wDw2ZTTXn2gY467grDOVi9E5vcusilc",
        authDomain: "alexsmok-1dc1c.firebaseapp.com",
        databaseURL: "https://alexsmok-1dc1c-default-rtdb.firebaseio.com",
        projectId: "alexsmok-1dc1c",
        appId: "1:173792761960:web:5bc84d324322edd58ac3dd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const user = tg.initDataUnsafe?.user || { id: "test", username: "guest" };
    const userSpinRef = db.ref('users/' + user.id + '/can_spin');

    let products = [], cart = [], curCat = 'all', isAdmin = false, tempVariants = [];
    let currentTier = 10, wheelConfigs = { t10: [], t50: [], t150: [] };

    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class Particle {
        constructor() { this.reset(); }
        reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*2; this.speedY = Math.random()*0.5 + 0.1; this.alpha = Math.random()*0.5; }
        update() { this.y -= this.speedY; if (this.y < -10) this.reset(); }
        draw() { ctx.fillStyle = `rgba(43, 255, 0, ${this.alpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }
    function initParticles() { for(let i=0; i<50; i++) particles.push(new Particle()); }
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate); }
    window.addEventListener('resize', resize); resize(); initParticles(); animate();

    window.onscroll = () => { document.getElementById('scrollTop').style.display = window.scrollY > 300 ? 'flex' : 'none'; };

    function showSkeletons() {
        document.getElementById('productGrid').innerHTML = Array(6).fill(0).map(() => `<div class="card glass skeleton" style="height: 280px;"></div>`).join('');
    }

    function load() {
        showSkeletons();
        db.ref('products').on('value', snap => {
            const val = snap.val();
            products = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
            render();
        });
        db.ref('settings/wheel_v2').on('value', snap => { if(snap.val()) wheelConfigs = snap.val(); });
    }

    function checkSpinStatus() {
        userSpinRef.on('value', (snap) => {
            const canSpin = !!snap.val();
            const btn = document.getElementById('spinBtn'), pay = document.getElementById('paymentButtons'), txt = document.getElementById('spinStatusText');
            if (!btn || !pay || !txt) return;
            if (isAdmin || canSpin) {
                pay.style.display = 'none'; btn.style.display = 'block'; btn.disabled = false;
                txt.innerText = isAdmin ? "АДМИН-ДОСТУП" : "ОПЛАЧЕНО!";
                txt.style.color = "var(--neon-green)";
            } else {
                pay.style.display = 'block'; btn.style.display = 'none';
                txt.innerText = `СТАВКА: ${currentTier} ₽`; txt.style.color = "white";
                document.getElementById('tgPayBtn').innerText = `КУПИТЬ СПИН ${currentTier} ⭐`;
            }
        });
    }

    function render() {
        const cats = ['all', ...new Set(products.map(p => p.category))];
        document.getElementById('cats').innerHTML = cats.map(c => `<div class="cat-link glass ${curCat === c ? 'active' : ''}" onclick="curCat='${c}';render()">${c === 'all' ? 'ВСЁ' : c}</div>`).join('');
        const filtered = curCat === 'all' ? products : products.filter(p => p.category === curCat);
        document.getElementById('productGrid').innerHTML = filtered.map((p, index) => {
            const isOut = p.inStock === false;
            const fitStyle = p.fit || 'cover';
            return `
            <div class="card glass ${isOut ? 'out-of-stock' : ''}" style="animation-delay: ${index * 0.05}s">
                ${isAdmin ? `<div class="admin-btns">
                    <button class="btn-mini btn-mini-edit" onclick="editProduct('${p.id}')"><i class="fas fa-pen"></i></button>
                    <button class="btn-mini btn-mini-del" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                </div>` : ''}
                ${isOut ? '<div class="out-label">НЕТ В НАЛИЧИИ</div>' : ''}
                <div class="card-img-wrapper"><img src="${p.imageData || ''}" class="card-img" style="object-fit: ${fitStyle};"></div>
                <div class="card-info">
                    <div class="card-name">${p.name}</div>
                    <div class="card-price">${p.price} ₽</div>
                    ${p.variants?.length > 0 ? 
                        `<button class="btn-variants" ${isOut?'disabled':''} onclick="showFlavors('${p.id}')">${p.variantButtonName || 'ВКУСЫ'}</button>` : 
                        `<button class="btn-variants" style="background:var(--neon-green);color:#000;border:none;" ${isOut?'disabled':''} onclick="addToCart('${p.id}', 'Стандарт')">В КОРЗИНУ</button>`
                    }
                </div>
            </div>`}).join('');
        document.getElementById('addFab').style.display = isAdmin ? 'flex' : 'none';
    }

    window.startStarsPay = () => tg.sendData(JSON.stringify({ action: "buy_spin", tier: currentTier }));

    window.setTier = (t) => {
        currentTier = t;
        document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t'+t).classList.add('active');
        openWheel();
    };

    window.runSpinAnimation = () => {
        const track = document.getElementById('slotTrack'), config = wheelConfigs['t'+currentTier] || [];
        if(config.length === 0) return alert("Настрой рулетку!");
        const winIdx = 40, winItem = pickWeightedRouletteItem(config);
        track.children[winIdx].innerText = winItem.name;
        track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
        track.style.transform = `translateY(-${winIdx * 160}px)`;
        setTimeout(() => {
            document.getElementById('spinResult').innerText = "ПРИЗ: " + winItem.name;
            tg.HapticFeedback.notificationOccurred('success');
            db.ref('roulette_history').push({ userId: user.id, username: user.username || 'Anon', tier: currentTier, prize: winItem.name, time: new Date().toISOString() });
            if (!isAdmin) { userSpinRef.set(false); checkSpinStatus(); }
        }, 4100);
    };

    function pickWeightedRouletteItem(config) {
        const weights = config.map(item => {
            const val = parseFloat(item.chance);
            return (item.chanceType === 'percent') ? (isNaN(val) || val <= 0 ? 1 : val) : (isNaN(val) || val <= 0 ? 1 : 100/val);
        });
        const sum = weights.reduce((a,b) => a+b, 0);
        let r = Math.random() * sum;
        for (let i = 0; i < config.length; i++) { if (r < weights[i]) return config[i]; r -= weights[i]; }
        return config[config.length - 1];
    }

    window.openWheel = () => {
        const config = wheelConfigs['t'+currentTier] || [];
        const track = document.getElementById('slotTrack');
        track.innerHTML = Array(60).fill(0).map((_,i) => `<div class="slot-item">${config[i%config.length]?.name || '...'}</div>`).join('');
        track.style.transition = 'none'; track.style.transform = 'translateY(0)';
        document.getElementById('spinResult').innerText = '';
        checkSpinStatus(); openModal('wheelOverlay');
    };

    window.showFlavors = (id) => {
        const p = products.find(x => x.id === id);
        document.getElementById('vTitle').innerText = p.variantButtonName || 'ВКУСЫ';
        document.getElementById('vList').innerHTML = (p.variants || []).map(v => `
            <div class="flavor-row">
                <div class="flavor-name">${v}</div>
                <button class="flavor-btn" onclick="addToCart('${p.id}', '${v}')">В КОРЗИНУ</button>
            </div>`).join('');
        openModal('vOverlay');
    };

    window.addToCart = (id, flavor) => {
        const p = products.find(x => x.id === id);
        cart.push({ name: p.name, flavor: flavor, price: parseInt(p.price) });
        updateCartUI(); closeModal('vOverlay'); tg.HapticFeedback.impactOccurred('medium');
    };

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('cartFab').classList.toggle('visible', cart.length > 0);
        let t = 0;
        document.getElementById('cartItems').innerHTML = cart.map(i => { t += i.price; return `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);"><span>${i.name} (${i.flavor})</span><b>${i.price}₽</b></div>` }).join('');
        document.getElementById('cartTotal').innerText = t + ' ₽';
    }

    window.sendToManager = () => {
        const msg = `ЗАКАЗ:\n` + cart.map(i => `- ${i.name} (${i.flavor})`).join('\n');
        tg.openTelegramLink(`https://t.me/smokinshop174?text=${encodeURIComponent(msg)}`);
    };

    window.handleAdminClick = () => isAdmin ? openModal('adminMenuOverlay') : openModal('loginOverlay');
    window.tryLogin = () => { if(document.getElementById('pass').value === 'smkn00') { isAdmin = true; render(); checkSpinStatus(); closeModal('loginOverlay'); document.getElementById('adminLock').classList.add('active'); } };
    window.logoutAdmin = () => { isAdmin=false; location.reload(); };

    window.openAddModal = () => {
        document.getElementById('pId').value = ''; document.getElementById('pForm').reset();
        document.getElementById('pInStock').checked = true;
        document.getElementById('pFit').value = 'cover';
        document.getElementById('previewImg').style.display = 'none';
        tempVariants = []; renderV(); openModal('adminOverlay');
    };

    window.editProduct = (id) => {
        const p = products.find(x => x.id === id);
        document.getElementById('pId').value = p.id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPrice').value = p.price;
        document.getElementById('pCat').value = p.category;
        document.getElementById('pBtnName').value = p.variantButtonName || '';
        document.getElementById('pInStock').checked = p.inStock !== false;
        document.getElementById('pFit').value = p.fit || 'cover';
        document.getElementById('pImg').value = p.imageData || '';
        if(p.imageData) { document.getElementById('previewImg').src = p.imageData; document.getElementById('previewImg').style.display='block'; }
        tempVariants = p.variants || []; renderV(); openModal('adminOverlay');
    };

    window.deleteProduct = (id) => {
        tg.showConfirm('Удалить этот товар?', (ok) => { if(ok) db.ref('products/'+id).remove(); });
    };

    function addV(v) { if(!v)return; tempVariants.push(v); renderV(); }
    function removeV(idx) { tempVariants.splice(idx, 1); renderV(); }
    function renderV() { document.getElementById('adminVList').innerHTML = tempVariants.map((v, i) => `<div class="flavor-tag">${v} <i class="fas fa-times" onclick="removeV(${i})"></i></div>`).join(''); }

    document.getElementById('fInp').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => { document.getElementById('pImg').value = reader.result; document.getElementById('previewImg').src = reader.result; document.getElementById('previewImg').style.display = 'block'; };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('pForm').onsubmit = (e) => {
        e.preventDefault();
        const id = document.getElementById('pId').value;
        const data = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            category: document.getElementById('pCat').value,
            variantButtonName: document.getElementById('pBtnName').value,
            inStock: document.getElementById('pInStock').checked,
            fit: document.getElementById('pFit').value,
            imageData: document.getElementById('pImg').value,
            variants: tempVariants
        };
        id ? db.ref('products/'+id).update(data) : db.ref('products').push(data);
        closeModal('adminOverlay');
    };

    let adminTier = 10;
    window.setAdminTier = (t) => { adminTier = t; document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active')); document.getElementById('at'+t).classList.add('active'); renderAdminRoulette(); };
    window.openRouletteAdmin = () => { renderAdminRoulette(); openModal('rouletteAdminOverlay'); };
    function renderAdminRoulette() {
        const list = wheelConfigs['t'+adminTier] || [];
        document.getElementById('rouletteItemsList').innerHTML = list.map((item, i) => `
            <div class="roulette-item-row">
                <input type="text" class="inp roulette-name" value="${item.name}" onchange="updateRouletteItem(${i}, 'name', this.value)">
                <div class="roulette-chance">
                    <select onchange="updateRouletteItem(${i}, 'chanceType', this.value)">
                        <option value="percent" ${item.chanceType==='percent'?'selected':''}>%</option>
                        <option value="spins" ${item.chanceType==='spins'?'selected':''}>1 из N</option>
                    </select>
                    <input type="number" value="${item.chance}" onchange="updateRouletteItem(${i}, 'chance', this.value)">
                </div>
                <button class="btn-mini" style="background:red;" onclick="removeRouletteItem(${i})">✕</button>
            </div>`).join('');
    }
    window.addRouletteItemUI = () => { wheelConfigs['t'+adminTier] = wheelConfigs['t'+adminTier] || []; wheelConfigs['t'+adminTier].push({ name: 'Приз', chanceType: 'percent', chance: 10 }); renderAdminRoulette(); };
    window.removeRouletteItem = (i) => { wheelConfigs['t'+adminTier].splice(i, 1); renderAdminRoulette(); };
    window.updateRouletteItem = (i, f, v) => { wheelConfigs['t'+adminTier][i][f] = v; renderAdminRoulette(); };
    window.saveRouletteConfig = () => db.ref('settings/wheel_v2').set(wheelConfigs).then(() => closeModal('rouletteAdminOverlay'));

    window.openRouletteHistory = () => {
        db.ref('roulette_history').limitToLast(100).once('value', snap => {
            const val = snap.val();
            document.getElementById('rouletteHistoryList').innerHTML = val ? Object.values(val).map(e => `
                <div style="padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.08);">
                    <b>${e.username}</b> | ${e.tier}₽ | ${e.prize} | <small>${new Date(e.time).toLocaleString()}</small>
                </div>`).join('') : 'Нет спинов';
        });
        openModal('rouletteHistoryOverlay');
    };

    window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; setTimeout(() => document.getElementById(id).classList.add('active'), 10); };
    window.closeModal = (id) => { document.getElementById(id).classList.remove('active'); setTimeout(() => document.getElementById(id).style.display = 'none', 400); };

    load();
</script>
</body>
</html>
