<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск штрафов ГИБДД</title>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 95%; max-width: 700px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .icon-logo { width: 100px; height: 100px; object-fit: contain; }
        
        .admin-link { text-decoration: none; color: #6c757d; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 8px 12px; border-radius: 8px; background: #f1f3f5; transition: 0.2s; }
        .admin-link:hover { background: #e2e6ea; }
        .icon-small { width: 25px; }

        .search-form { display: flex; gap: 12px; }
        input { flex: 1; padding: 16px 20px; border: 2px solid #dee2e6; border-radius: 14px; font-size: 16px; outline: none; transition: 0.3s; text-transform: uppercase; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }
        .input-wrapper { display: flex; flex-direction: column; flex: 1; }
        .input-hint { margin-top: 6px; font-size: 12px; color: #868e96; }

        .btn-search { background: var(--primary); color: white; border: none; padding: 0 30px; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(67, 97, 238, 0.3); }

        .empty-state { text-align: center; margin-top: 50px; padding: 20px; }
        .icon-status { width: 200px; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { text-align: left; padding: 12px; color: #adb5bd; font-size: 13px; text-transform: uppercase; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f3f5; vertical-align: middle; }
        .badge-price { background: #fff0f0; color: #e63946; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .btn-pay { background: var(--success); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-pay:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo-box">
                <img src="{{ url_for('static', filename='images/logo.png') }}" class="icon-logo">
                <h2 style="margin:0; color:#333;">Проверка нарушений ПДД</h2>
            </div>
            <a href="/admin" class="admin-link">
                <img src="{{ url_for('static', filename='images/admin.png') }}" class="icon-small"> Панель
            </a>
        </div>

<form method="POST" class="search-form">
            <div class="input-wrapper">
                <input type="text" name="car_number" placeholder="Госномер"
                       pattern="^[А-Яа-яA-Za-z]{1}\d{3}[А-Яа-яA-Za-z]{2}\d{2,3}$" required>
                <div class="input-hint">Пример: А000АА77</div>
            </div>
            <button type="submit" class="btn-search">
                <img src="{{ url_for('static', filename='images/search.png') }}" class="icon-small" style="filter: brightness(0) invert(1);"> Найти
            </button>
        </form>

        {% if fines is not none %}
            {% if fines %}
                <table>
                    <thead>
                        <tr>
                            <th>Нарушение</th>
                            <th>Сумма</th>
                            <th>Место</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for fine in fines %}
                        <tr>
                            <td><strong>{{ fine[1] }}</strong><br><small style="color:#999;">{{ fine[3] }}</small></td>
                            <td><span class="badge-price">{{ fine[2] }} ₽</span></td>
                            <td>{{ fine[4] }}</td>
                            <td>
                                <form method="POST" action="{{ url_for('pay') }}">
                                    <input type="hidden" name="fine_id" value="{{ fine[0] }}">
                                    <input type="hidden" name="car_number" value="{{ query }}">
                                    <button type="submit" class="btn-pay">Оплатить</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <div class="empty-state">
<img src="{{ url_for('static', filename='images/success.png') }}" class="icon-status">
                    <p style="color: #6c757d;">Для автомобиля <b>{{ query }}</b> штрафов не найдено.</p>
                </div>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
